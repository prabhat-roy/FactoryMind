apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: factorymind
  labels:
    app.kubernetes.io/name: scheduler-service
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: scheduler-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: scheduler-service, factorymind.io/domain: platform }
    spec:
      serviceAccountName: scheduler-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: scheduler-service
          image: harbor.factorymind.internal/factorymind/scheduler-service:latest
          ports: [{ containerPort: 50004, name: http }]
          envFrom: [{ configMapRef: { name: scheduler-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50004 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50004 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
