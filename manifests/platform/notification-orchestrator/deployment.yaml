apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-orchestrator
  namespace: factorymind
  labels:
    app.kubernetes.io/name: notification-orchestrator
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: notification-orchestrator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: notification-orchestrator, factorymind.io/domain: platform }
    spec:
      serviceAccountName: notification-orchestrator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: notification-orchestrator
          image: harbor.factorymind.internal/factorymind/notification-orchestrator:latest
          ports: [{ containerPort: 50003, name: http }]
          envFrom: [{ configMapRef: { name: notification-orchestrator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50003 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50003 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
