apiVersion: apps/v1
kind: Deployment
metadata:
  name: sap-adapter
  namespace: factorymind
  labels:
    app.kubernetes.io/name: sap-adapter
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: erp-integration
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: sap-adapter } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sap-adapter, factorymind.io/domain: erp-integration }
    spec:
      serviceAccountName: sap-adapter
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: sap-adapter
          image: harbor.factorymind.internal/factorymind/sap-adapter:latest
          ports: [{ containerPort: 50260, name: http }]
          envFrom: [{ configMapRef: { name: sap-adapter } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
