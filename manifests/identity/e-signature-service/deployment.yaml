apiVersion: apps/v1
kind: Deployment
metadata:
  name: e-signature-service
  namespace: factorymind
  labels:
    app.kubernetes.io/name: e-signature-service
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: e-signature-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: e-signature-service, factorymind.io/domain: identity }
    spec:
      serviceAccountName: e-signature-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: e-signature-service
          image: harbor.factorymind.internal/factorymind/e-signature-service:latest
          ports: [{ containerPort: 50023, name: http }]
          envFrom: [{ configMapRef: { name: e-signature-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50023 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50023 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
