apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-compliance
  namespace: factorymind
  labels:
    app.kubernetes.io/name: training-compliance
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: workforce
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: training-compliance } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: training-compliance, factorymind.io/domain: workforce }
    spec:
      serviceAccountName: training-compliance
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: training-compliance
          image: harbor.factorymind.internal/factorymind/training-compliance:latest
          ports: [{ containerPort: 50222, name: http }]
          envFrom: [{ configMapRef: { name: training-compliance } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
