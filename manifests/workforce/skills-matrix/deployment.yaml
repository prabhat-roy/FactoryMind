apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-matrix
  namespace: factorymind
  labels:
    app.kubernetes.io/name: skills-matrix
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: workforce
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: skills-matrix } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: skills-matrix, factorymind.io/domain: workforce }
    spec:
      serviceAccountName: skills-matrix
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: skills-matrix
          image: harbor.factorymind.internal/factorymind/skills-matrix:latest
          ports: [{ containerPort: 50221, name: http }]
          envFrom: [{ configMapRef: { name: skills-matrix } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50221 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50221 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
