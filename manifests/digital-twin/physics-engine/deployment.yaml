apiVersion: apps/v1
kind: Deployment
metadata:
  name: physics-engine
  namespace: factorymind
  labels:
    app.kubernetes.io/name: physics-engine
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: digital-twin
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: physics-engine } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: physics-engine, factorymind.io/domain: digital-twin }
    spec:
      serviceAccountName: physics-engine
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: physics-engine
          image: harbor.factorymind.internal/factorymind/physics-engine:latest
          ports: [{ containerPort: 50122, name: http }]
          envFrom: [{ configMapRef: { name: physics-engine } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
