apiVersion: apps/v1
kind: Deployment
metadata:
  name: oee-analytics
  namespace: factorymind
  labels:
    app.kubernetes.io/name: oee-analytics
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: oee-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: oee-analytics, factorymind.io/domain: analytics }
    spec:
      serviceAccountName: oee-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: oee-analytics
          image: harbor.factorymind.internal/factorymind/oee-analytics:latest
          ports: [{ containerPort: 50280, name: http }]
          envFrom: [{ configMapRef: { name: oee-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50280 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50280 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
