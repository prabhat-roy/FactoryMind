apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-analytics
  namespace: factorymind
  labels:
    app.kubernetes.io/name: quality-analytics
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: quality-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: quality-analytics, factorymind.io/domain: analytics }
    spec:
      serviceAccountName: quality-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: quality-analytics
          image: harbor.factorymind.internal/factorymind/quality-analytics:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: quality-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
