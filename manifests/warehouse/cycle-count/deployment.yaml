apiVersion: apps/v1
kind: Deployment
metadata:
  name: cycle-count
  namespace: factorymind
  labels:
    app.kubernetes.io/name: cycle-count
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: warehouse
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cycle-count } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cycle-count, factorymind.io/domain: warehouse }
    spec:
      serviceAccountName: cycle-count
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cycle-count
          image: harbor.factorymind.internal/factorymind/cycle-count:latest
          ports: [{ containerPort: 50143, name: http }]
          envFrom: [{ configMapRef: { name: cycle-count } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
