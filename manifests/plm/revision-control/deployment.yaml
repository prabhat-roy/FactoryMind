apiVersion: apps/v1
kind: Deployment
metadata:
  name: revision-control
  namespace: factorymind
  labels:
    app.kubernetes.io/name: revision-control
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: plm
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: revision-control } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: revision-control, factorymind.io/domain: plm }
    spec:
      serviceAccountName: revision-control
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: revision-control
          image: harbor.factorymind.internal/factorymind/revision-control:latest
          ports: [{ containerPort: 50181, name: http }]
          envFrom: [{ configMapRef: { name: revision-control } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
