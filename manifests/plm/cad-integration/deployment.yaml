apiVersion: apps/v1
kind: Deployment
metadata:
  name: cad-integration
  namespace: factorymind
  labels:
    app.kubernetes.io/name: cad-integration
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: plm
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cad-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cad-integration, factorymind.io/domain: plm }
    spec:
      serviceAccountName: cad-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cad-integration
          image: harbor.factorymind.internal/factorymind/cad-integration:latest
          ports: [{ containerPort: 50182, name: http }]
          envFrom: [{ configMapRef: { name: cad-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50182 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50182 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
