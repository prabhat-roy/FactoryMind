apiVersion: apps/v1
kind: Deployment
metadata:
  name: lot-tracking
  namespace: factorymind
  labels:
    app.kubernetes.io/name: lot-tracking
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: traceability
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: lot-tracking } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: lot-tracking, factorymind.io/domain: traceability }
    spec:
      serviceAccountName: lot-tracking
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: lot-tracking
          image: harbor.factorymind.internal/factorymind/lot-tracking:latest
          ports: [{ containerPort: 50300, name: http }]
          envFrom: [{ configMapRef: { name: lot-tracking } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
