apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-maintenance
  namespace: factorymind
  labels:
    app.kubernetes.io/name: predictive-maintenance
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: maintenance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: predictive-maintenance } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: predictive-maintenance, factorymind.io/domain: maintenance }
    spec:
      serviceAccountName: predictive-maintenance
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: predictive-maintenance
          image: harbor.factorymind.internal/factorymind/predictive-maintenance:latest
          ports: [{ containerPort: 50100, name: http }]
          envFrom: [{ configMapRef: { name: predictive-maintenance } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
