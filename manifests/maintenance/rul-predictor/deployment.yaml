apiVersion: apps/v1
kind: Deployment
metadata:
  name: rul-predictor
  namespace: factorymind
  labels:
    app.kubernetes.io/name: rul-predictor
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: maintenance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: rul-predictor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rul-predictor, factorymind.io/domain: maintenance }
    spec:
      serviceAccountName: rul-predictor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: rul-predictor
          image: harbor.factorymind.internal/factorymind/rul-predictor:latest
          ports: [{ containerPort: 50103, name: http }]
          envFrom: [{ configMapRef: { name: rul-predictor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
