apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibration-monitoring
  namespace: factorymind
  labels:
    app.kubernetes.io/name: vibration-monitoring
    app.kubernetes.io/part-of: factorymind
    factorymind.io/domain: maintenance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: vibration-monitoring } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vibration-monitoring, factorymind.io/domain: maintenance }
    spec:
      serviceAccountName: vibration-monitoring
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: vibration-monitoring
          image: harbor.factorymind.internal/factorymind/vibration-monitoring:latest
          ports: [{ containerPort: 50101, name: http }]
          envFrom: [{ configMapRef: { name: vibration-monitoring } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
