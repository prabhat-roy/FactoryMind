replicaCount: 2
image: { repository: ghcr.io/factorymind/mes-bff, tag: "0.1.0", pullPolicy: IfNotPresent }
service: { type: ClusterIP, port: 8080, metricsPort: 9090 }
serviceAccount: { create: true, name: "", annotations: {} }
podAnnotations: { prometheus.io/scrape: "true", prometheus.io/port: "9090" }
podSecurityContext: { runAsNonRoot: true, runAsUser: 65532, fsGroup: 65532 }
securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
resources: { requests: { cpu: 100m, memory: 192Mi }, limits: { cpu: 500m, memory: 512Mi } }
livenessProbe: { httpGet: { path: /healthz, port: 8080 } }
readinessProbe: { httpGet: { path: /healthz, port: 8080 } }
rollout: { strategy: canary }
otTouching: false
env: []
