apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: factorymind-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prabhat-roy/FactoryMind.git
    targetRevision: HEAD
    path: gitops/argocd/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }