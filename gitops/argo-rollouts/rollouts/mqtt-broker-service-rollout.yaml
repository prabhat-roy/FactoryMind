apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mqtt-broker-service
  namespace: factorymind
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: factorymind-canary-analysis }]
            args:
              - { name: service-name, value: mqtt-broker-service }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: mqtt-broker-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mqtt-broker-service }
    spec:
      containers:
        - name: mqtt-broker-service
          image: harbor.factorymind.internal/factorymind/mqtt-broker-service:latest
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 15, periodSeconds: 30 }
