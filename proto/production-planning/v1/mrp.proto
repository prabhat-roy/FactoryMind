syntax = "proto3";

package factorymind.production_planning.v1;

import "common/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/factorymind/proto/gen/go/production-planning/v1;productionplanningv1";
option java_multiple_files = true;
option java_package = "io.factorymind.proto.production_planning.v1";

message MRPRunRequest {
  string site_id = 1;
  google.protobuf.Timestamp horizon_start = 2;
  google.protobuf.Timestamp horizon_end = 3;
  string scenario = 4;
}

message MRPRunResponse {
  string run_id = 1;
  int32 planned_orders = 2;
  int32 purchase_requisitions = 3;
  google.protobuf.Timestamp completed_at = 4;
}

message MRPDemandLine {
  string material_id = 1;
  factorymind.common.v1.Quantity quantity = 2;
  google.protobuf.Timestamp due_date = 3;
  string source = 4; // SALES_ORDER | FORECAST | INTERCOMPANY
}

service MrpService {
  rpc RunMRP(MRPRunRequest) returns (MRPRunResponse);
}
