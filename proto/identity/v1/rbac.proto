syntax = "proto3";

package factorymind.identity.v1;

option go_package = "github.com/factorymind/proto/gen/go/identity/v1;identityv1";
option java_multiple_files = true;
option java_package = "io.factorymind.proto.identity.v1";

message Role {
  string id = 1;
  string name = 2;
  repeated string permissions = 3;
}

message AssignRoleRequest {
  string subject = 1;
  string role_id = 2;
}

message AssignRoleResponse {
  bool ok = 1;
}

service RbacService {
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
}
