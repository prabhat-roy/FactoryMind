syntax = "proto3";

package factorymind.energy.v1;

import "common/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/factorymind/proto/gen/go/energy/v1;energyv1";
option java_multiple_files = true;
option java_package = "io.factorymind.proto.energy.v1";

// OEE = Availability * Performance * Quality
message OeeSnapshot {
  string equipment_id = 1;
  google.protobuf.Timestamp window_start = 2;
  google.protobuf.Timestamp window_end = 3;
  double availability = 4;
  double performance = 5;
  double quality = 6;
  double oee = 7;
  uint64 planned_production_seconds = 8;
  uint64 actual_run_seconds = 9;
  uint64 ideal_cycle_seconds = 10;
  uint64 total_count = 11;
  uint64 good_count = 12;
}

message GetOeeRequest {
  string equipment_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

service OeeService {
  rpc GetOee(GetOeeRequest) returns (OeeSnapshot);
}
