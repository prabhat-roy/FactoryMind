syntax = "proto3";

package factorymind.supply_chain.v1;

import "common/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/factorymind/proto/gen/go/supply-chain/v1;supplychainv1";
option java_multiple_files = true;
option java_package = "io.factorymind.proto.supply_chain.v1";

message PurchaseOrderLine {
  string material_id = 1;
  factorymind.common.v1.Quantity quantity = 2;
  factorymind.common.v1.Money unit_price = 3;
  google.protobuf.Timestamp expected_delivery = 4;
}

message PurchaseOrder {
  string id = 1;
  string supplier_id = 2;
  string number = 3;
  repeated PurchaseOrderLine lines = 4;
  string status = 5;
  factorymind.common.v1.AuditMeta audit = 6;
}

message CreatePurchaseOrderRequest {
  PurchaseOrder po = 1;
}

service PurchaseOrderService {
  rpc CreatePurchaseOrder(CreatePurchaseOrderRequest) returns (PurchaseOrder);
}
