syntax = "proto3";

package factorymind.digital_twin.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/factorymind/proto/gen/go/digital-twin/v1;digitaltwinv1";
option java_multiple_files = true;
option java_package = "io.factorymind.proto.digital_twin.v1";

message SimulationRun {
  string id = 1;
  string scenario_name = 2;
  google.protobuf.Struct inputs = 3;
  google.protobuf.Struct outputs = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
  string status = 7; // QUEUED | RUNNING | DONE | FAILED
}

message StartSimulationRequest {
  string scenario_name = 1;
  google.protobuf.Struct inputs = 2;
}

message GetSimulationRequest {
  string id = 1;
}

service SimulationService {
  rpc StartSimulation(StartSimulationRequest) returns (SimulationRun);
  rpc GetSimulation(GetSimulationRequest) returns (SimulationRun);
}
