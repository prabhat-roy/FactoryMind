apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: factorymind-anomaly-detection, namespace: factorymind }
spec:
  deploymentName: factorymind-flink
  job:
    jarURI: s3://factorymind-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "factorymind.metrics.raw", "--sink-topic", "factorymind.alerts.anomaly"]
